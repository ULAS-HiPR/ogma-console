name: Console CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test and package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ogma-console
      - uses: actions/checkout@v4
        with:
          repository: ULAS-HiPR/croi
          ref: ogma/flight-hardening
          path: croi
          submodules: recursive
      - uses: actions/checkout@v4
        with:
          repository: ULAS-HiPR/gs_receiver
          ref: ogma/flight-hardening
          path: groundstation
      - uses: actions/checkout@v4
        with:
          repository: ULAS-HiPR/teachtaire
          ref: ogma/flight-hardening
          path: teachtaire
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pytest
      - run: python -m pytest -q
        working-directory: ogma-console
        env:
          OGMA_ROOT: ${{ github.workspace }}
      - run: python -m pip wheel . --no-deps --no-build-isolation --wheel-dir dist
        working-directory: ogma-console
      - uses: actions/upload-artifact@v4
        with:
          name: ogma-console-wheel
          path: ogma-console/dist/*.whl
          if-no-files-found: error
